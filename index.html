<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            width: 100vw;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #avatar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            will-change: contents;
        }

        #ui-text {
            position: absolute;
            top: 3.5vh;
            left: 2vw;
            color: #FFFFFF;
            font-family: 'Consolas', sans-serif;
            font-size: 80px;
            font-weight: bold;
            line-height: 1.2;
            z-index: 1;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            will-change: contents;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="ui-text">hits: <span id="hits">0</span><br>cps: <span id="cps">0</span></div>
        <img id="avatar" src="Assets/PlayArea-0.png" />
    </div>
    <script>
        const imgElement = document.getElementById('avatar');
        const hitsElement = document.getElementById('hits');
        const cpsElement = document.getElementById('cps');

        const frameNames = [
        'PlayArea-0.png', 'PlayArea-1.png', 'PlayArea-Hit-0.png',
        'PlayArea-Hit-1.png', 'PlayArea-Hit-2.png', 'PlayArea-Hit-4.png',
        'PlayArea-Hit-5.png', 'PlayArea-Hit-6.png'
        ];
        const imageCache = new Map();

        frameNames.forEach(name => {
        const img = new Image();
        img.src = 'Assets/' + name;
        imageCache.set(name, img.src);
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let slapBuffer = null;

        fetch('Assets/slap.wav')
        .then(res => res.arrayBuffer())
        .then(data => audioCtx.decodeAudioData(data))
        .then(buffer => slapBuffer = buffer)
        .catch(() => {});

        function playStreamSound() {
        if (!slapBuffer) return;

        if (audioCtx.state === 'suspended') audioCtx.resume();

        const source = audioCtx.createBufferSource();
        source.buffer = slapBuffer;
        source.connect(audioCtx.destination);
        source.start(0);
        }

        let socket;
        function connect() {
        socket = new WebSocket('ws://localhost:8080/');

        socket.onmessage = function(event) {
        const data = JSON.parse(event.data);

        if (hitsElement.textContent !== data.totalHits.toString()) {
        hitsElement.textContent = data.totalHits;
        }
        if (cpsElement.textContent !== data.cps.toString()) {
        cpsElement.textContent = data.cps;
        }

        if (data.playSound) {
        playStreamSound();
        }

        const targetSrc = imageCache.get(data.frame) || ('Assets/' + data.frame);
        if (imgElement.src !== targetSrc) {
        imgElement.src = targetSrc;
        }
        };

        socket.onclose = function() {
        setTimeout(connect, 2000);
        };

        socket.onerror = function() {
        socket.close();
        };
        }

        connect();
    </script>
</body>
