<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: transparent; }
        #container { position: relative; width: 1024px; height: 576px; }
        #avatar { position: absolute; top: 0; left: 0; width: 1024px; height: 576px; z-index: 2; }
        #ui-text {
            position: absolute; top: 20px; left: 20px; color: #FFFFFF;
            font-family: 'Consolas', sans-serif; font-size: 80px; font-weight: bold;
            line-height: 1.2; z-index: 1;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="ui-text">hits: <span id="hits">0</span><br>cps: <span id="cps">0</span></div>
        <img id="avatar" src="Assets/PlayArea-0.png" />
    </div>
    <script>
        const imgElement = document.getElementById('avatar');
        const hitsElement = document.getElementById('hits');
        const cpsElement = document.getElementById('cps');

        const AUDIO_CHANNELS_COUNT = 10;
        const audioPool = [];
        let currentChannel = 0;

        for (let i = 0; i < AUDIO_CHANNELS_COUNT; i++) {
            const audio = new Audio('Assets/slap.wav');
            audio.buffer = true;
            audioPool.push(audio);
        }

        function playStreamSound() {
            const sound = audioPool[currentChannel];
            sound.currentTime = 0;
            sound.play().catch(err => {});
            currentChannel = (currentChannel + 1) % AUDIO_CHANNELS_COUNT;
        }

        const socket = new WebSocket('ws://localhost:8080/');
        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            hitsElement.textContent = data.totalHits;
            cpsElement.textContent = data.cps;
            
            if (data.playSound) {
                playStreamSound();
            }

            const targetSrc = 'Assets/' + data.frame;
            if (imgElement.getAttribute('src') !== targetSrc) { 
                imgElement.src = targetSrc; 
            }
        };
    </script>
</body>
</html>
