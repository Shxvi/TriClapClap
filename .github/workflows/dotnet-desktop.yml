name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Application
      run: dotnet build -c Release

    - name: Package Release Asset
      shell: powershell
      run: |
        Copy-Item -Path "config.json" -Destination "bin\Release\net10.0-windows\" -ErrorAction SilentlyContinue
        Copy-Item -Path "index.html" -Destination "bin\Release\net10.0-windows\" -ErrorAction SilentlyContinue
        
        Compress-Archive -Path "bin\Release\net10.0-windows\*" -DestinationPath "triclapclap-${{ github.ref_name }}.zip"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: triclapclap-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
